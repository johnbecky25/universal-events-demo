server {
      listen 80;
      server_name demo.yourdomain.com;   # ← change to your domain or VPS IP

      root /var/www/universal-events-demo;
      index index.html;

      # Long-cache for versioned assets
      location /assets/ {
          expires 1y;
          add_header Cache-Control "public, immutable";
      }

      # SPA fallback — all routes go to index.html
      location / {
          try_files $uri $uri/ /index.html;
      }
  }
  